<!DOCTYPE html>
<html lang="lv">
    <head>
        <title>ToDo saraksts</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="card mx-auto" style="max-width: 500px;">
                <div class="card-body">
                <h3 class="card-title text-center mb-4">Todo List V3</h3>
                <div class="input-group mb-3">
                <select id="priority" class="form-select">
                <option value="low">Zema</option>
                <option value="medium">Vidēja</option>
                <option value="high">Svarīgi</option>
                </select>
                <input type="text" id="task-input" class="form-control" placeholder="Ieraksti darbu...">
                <button class="btn btn-primary" onclick="addTask()">Pievienot</button>
                </div>
                <div class="d-flex gap-2 mb-3">
                <input type="text" id="search-input" class="form-control" oninput="filterTasks()" placeholder="Meklēt uzdevumu...">
                <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                    <label class="btn btn-outline-secondary" for="btnradio1" onclick="filterTasks('all')">Visi</label>

                    <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                    <label class="btn btn-outline-secondary" for="btnradio2" onclick="filterTasks('active')">Aktīvie</label>

                    <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off">
                    <label class="btn btn-outline-secondary" for="btnradio3" onclick="filterTasks('completed')">Pabeigtie</label>
                </div>
                </div>
                <ul id="task-list" class="list-group"></ul>
                <div class="d-flex justify-content-between align-items-center mt-3">
                <span id="task-count">Atlikuši 0 darbi</span>
                <button class="btn btn-outline-danger btn-sm" onclick="clearCompleted()">Notīrīt pabeigtos</button>
                </div>
                </div>
            </div>
        </div>
        <script>
        document.addEventListener("DOMContentLoaded", function(){
        loadData();
        document.getElementById("search-input").addEventListener("input", applyFilters);
        });
        const priorities = {
        high: { class: "bg-danger", text: "SVARĪGI" },
        medium: { class: "bg-warning text-dark", text: "Vidēja" },
        low: { class: "bg-secondary", text: "Zema" }
        };
        let currentFilter = "all";

        function addTask(){
        const input = document.getElementById("task-input");
        const priority = document.getElementById("priority").value;
        const taskText = input.value.trim();
        if(taskText === "") return;
        const ul = document.getElementById("task-list");
        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";
        const badgeClass = priorities[priority].class;
        const badgeText = priorities[priority].text;
        li.innerHTML = `
        <div>
        <span class="badge ${badgeClass} me-2">${badgeText}</span>
        <span class="task-text">${taskText}</span>
        </div>
        <button class="btn btn-outline-danger btn-sm">Dzēst</button>
        `;
        const text = li.querySelector(".task-text");
        text.onclick = function(){
        text.classList.toggle("text-decoration-line-through");
        text.classList.toggle("text-muted");
        saveData();
        applyFilters();
        };
        li.querySelector("button").onclick = function(){
        li.remove();
        saveData();
        applyFilters();
        };
        ul.appendChild(li);
        input.value = "";
        saveData();
        applyFilters();
        }

        function saveData(){
            const tasks = [];
            document.querySelectorAll("#task-list li").forEach(li => {
            const text = li.querySelector(".task-text");
            const badge = li.querySelector(".badge");
            let priority = "low";
            if(badge.classList.contains("bg-danger")) priority = "high";
                if(badge.classList.contains("bg-warning")) priority = "medium";

                tasks.push({
                    text: text.textContent,
                    completed: text.classList.contains("text-decoration-line-through"),
                    priority: priority
                });
            });

            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function loadData(){
            const data = JSON.parse(localStorage.getItem("tasks")) || [];
            data.forEach(task => {
            const ul = document.getElementById("task-list");
            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            const badgeClass = priorities[task.priority].class;
            const badgeText = priorities[task.priority].text;
            li.innerHTML = `
            <div>
            <span class="badge ${badgeClass} me-2">${badgeText}</span>
            <span class="task-text">${task.text}</span>
            </div>
            <button class="btn btn-outline-danger btn-sm">Dzēst</button>
            `;
            const text = li.querySelector(".task-text");
            if(task.completed){
                text.classList.add("text-decoration-line-through");
                text.classList.add("text-muted");
            }
            text.onclick = function(){
                text.classList.toggle("text-decoration-line-through");
                text.classList.toggle("text-muted");
                saveData();
                applyFilters();
            };
            li.querySelector("button").onclick = function(){
                li.remove();
                saveData();
                applyFilters();
            };
            ul.appendChild(li);
            });
            applyFilters();
        }

        function filterTasks(type){
            currentFilter = type;
            applyFilters();
        }

        function applyFilters(){
            const searchValue = document.getElementById("search-input").value.toLowerCase();
            const tasks = document.querySelectorAll("#task-list li");
            tasks.forEach(task => {
                const textElement = task.querySelector(".task-text");
                const text = textElement.textContent.toLowerCase();
                const completed = textElement.classList.contains("text-decoration-line-through");
                let visible = true;
                if(currentFilter === "active" && completed) visible = false;
                if(currentFilter === "completed" && !completed) visible = false;
                if(!text.includes(searchValue)) visible = false;
                task.style.display = visible ? "" : "none";
                let children = task.children;
                for (let child of children){
                    child.style.display = visible ? "" : "none";  
                }
                task.style.paddingTop = visible ? "8px" : "0px";
                task.style.paddingBottom = visible ? "8px" : "0px";
                task.style.borderTopWidth = visible ? "1px" : "0px";
                task.style.borderBottomWidth = visible ? "1px" : "0px";
                task.hidden = visible ? undefined : "true";
            });
            updateTaskCount();
        }

        function updateTaskCount(){
            const tasks = document.querySelectorAll("#task-list li");
            let remaining = 0;
            tasks.forEach(task => {
                const text = task.querySelector(".task-text");
                if(!text.classList.contains("text-decoration-line-through")){
                    remaining++;
                }
                });
            document.getElementById("task-count").textContent = "Atlikuši " + remaining + " darbi";
        }

        function clearCompleted(){
            document.querySelectorAll("#task-list li").forEach(li => {
                const text = li.querySelector(".task-text");
                if(text.classList.contains("text-decoration-line-through")){
                    li.remove();
                }
            });
            saveData();
            applyFilters();
        }
        </script>
    </body>
</html>
